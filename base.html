<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --FontFamily_1-FontFamily-FontFamily: Lexend;
      --FontFamily_1-FontSizes-FontSize_1: 36px;
      --FontFamily_1-FontWeights-Weight_1: 400;
      --FontFamily_1-FontSizes-FontSize_7: 16px;
      --link: #154B8C;
      --FontFamily_1-FontSizes-FontSize_5: 20px;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #091E3A;
      background: -webkit-linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
      background: linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
      overflow: hidden;
    }

    /* MOCKUP DO IPHONE 16 */
    .smartphone-container {
      width: 288px;
      height: 608px;
      background: #000000; /* Preto absoluto para simular o vidro e chassi real */
      border-radius: 40px; /* Cantos mais arredondados característicos do iPhone 16 */
      padding: 6px; /* Moldura preta lateral simétrica */
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 0 4px rgba(255, 255, 255, 0.2);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* DYNAMIC ISLAND (ILHA DINÂMICA REAL) */
    .smartphone-notch {
      position: absolute;
      top: 11px; /* Descolada do topo, exatamente como a ilha real flutua na ecrã */
      left: 50%;
      transform: translateX(-50%);
      width: 82px; /* Proporção ideal em formato de pílula para este tamanho de mockup */
      height: 24px;
      background-color: #000000;
      border-radius: 20px; /* Arredondamento completo em todos os cantos */
      z-index: 10;
      box-shadow: inset 0 0 2px rgba(255, 255, 255, 0.1);
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #FFF;
      overflow: hidden;
      position: relative;
      border-radius: 34px; /* Acompanha harmoniosamente a curvatura externa */
    }
  </style>
</head>
<body>

  <div class="smartphone-container">
    <div class="smartphone-notch"></div>

    <div class="phone-screen">
      </div>
  </div>

</body>
</html>
