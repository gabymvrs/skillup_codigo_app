    :root {

    body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #091E3A;
    background: -webkit-linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
    background: linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
    overflow: hidden;
  }

    .smartphone-container {
  width: 288px;
  height: 608px;
  background: #1a1b1e;
  border-radius: 36px;
  padding: 4px;
  box-shadow: 0 25px 50px rgba(0,0,0,.6);
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

    .smartphone-notch {
    position:absolute;
    top:4px;
    left:50%;
    transform:translateX(-50%);
    width:110px;
    height:18px;
    background:#1a1b1e;
    border-bottom-left-radius:12px;
    border-bottom-right-radius:12px;
    z-index:10;
}

  .phone-screen{
    width:280px;
    height:600px;
    background:#FFF;
    overflow:hidden;
    position:relative;
    border-radius:32px;
}
    /* Ajuste de escala perfeito para o design de 393px do Figma */
    .figma-content {
      position: absolute;
      width: 393px;
      height: 852px;
      top: 0;
      left: 0;
      transform: scale(0.712);
      transform-origin: top left;
    }
  </style>
