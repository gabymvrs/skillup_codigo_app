<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillUp - Login iPhone 16</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --FontFamily_1-FontFamily-FontFamily: 'Lexend', sans-serif;
      --FontFamily_1-FontSizes-FontSize_1: 36px;
      --FontFamily_1-FontWeights-Weight_1: 400;
      --FontFamily_1-FontSizes-FontSize_7: 16px;
      --FontFamily_1-FontSizes-FontSize_5: 20px;
      --link: #154B8C;
      --FontFamily_1-FontSizes-FontSize_8: 14px;
      --500-primaria: #081998;
    }

    /* Força TODOS os elementos do site a usarem a Lexend por padrão */
    * {
      font-family: 'Lexend', sans-serif !important;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #091E3A;
      background: -webkit-linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
      background: linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
      overflow: hidden;
    }

    .smartphone-container {
      width: 288px;
      height: 608px;
      background: #1a1b1e;
      border-radius: 36px;
      padding: 4px;
      box-shadow: 0 25px 50px rgba(0,0,0,.6);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .smartphone-notch {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 18px;
      background: #1a1b1e;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      z-index: 10;
    }

    .phone-screen {
      width: 280px;
      height: 600px;
      background: #FFF;
      overflow: hidden;
      position: relative;
      border-radius: 32px;
    }

    /* Ajuste de escala do Figma */
    .figma-content {
      position: absolute;
      width: 393px;
      height: 852px;
      top: 0;
      left: 0;
      transform: scale(0.712);
      transform-origin: top left;
    }

    /* Inputs estilizados */
    .input-field {
      width: 299px;
      height: 50px;
      border-radius: 25px;
      background: #F1F1F1;
      border: none;
      padding: 0 20px;
      box-sizing: border-box;
      font-size: 16px;
      color: #000;
    }
    
    .input-field::placeholder {
      color: #B4B4B4;
    }

    .input-field:focus {
      outline: 2px solid var(--500-primaria);
      background: #FFF;
    }

    .btn-login {
      width: 177px;
      height: 56px;
      border-radius: 20px;
      background: #081998;
      border: none;
      color: #FFF;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }

    .link-account {
      color: #154B8C;
      text-align: center;
      font-size: 14px;
      text-decoration: underline;
      display: block;
    }
  </style>
</head>
<body>

  <div class="smartphone-container">
    <div class="smartphone-notch"></div>
    
    <div class="phone-screen">
      
      <form class="figma-content" action="#" method="POST">
        <div style="color:#000; font-size:36px; position:absolute; left:97px; top:191px; width:199px; height:45px">
          <span>Bem-vindo!</span>
        </div>
        
        <div style="width:281px; color:#000; text-align:center; font-size:16px; position:absolute; left:56px; top:244px; height:40px">
          <span>Complete as informações para concluir o Login.</span>
        </div>
        
        <div style="width:299px; height:190px; position:absolute; left:47px; top:340px">
          <label style="color:#000; font-size:20px; position:absolute; left:0px; top:0px; width:67px; height:25px">E-mail:</label>
          <div style="width:299px; height:50px; position:absolute; left:0px; top:32px">
            <input type="email" class="input-field" placeholder="Ex: Aluno@gmail.com" required>
          </div>

          <label style="color:#000; font-size:20px; position:absolute; left:0px; top:108px; width:66px; height:25px">Senha:</label>
          <div style="width:299px; height:50px; position:absolute; left:0px; top:140px">
            <input type="password" class="input-field" placeholder="Ex: Aluno_@123" required>
          </div>
        </div>
        
        <a href="selecao_conta.html" style="position:absolute; left:56px; top:547px; width:148px; height:18px;" class="link-account">
          Não tenho uma conta
        </a>
        
        <div style="position:absolute; left:108px; top:597px;">
          <button type="submit" class="btn-login">Fazer Login</button>
        </div>

        <div style="display:inline-flex; align-items:center; gap:32px; position:absolute; left:145px; top:701px; width:104px; height:36px">
          <a href="#" style="height: 36px;">

            </svg>
          </a>
          <a href="#" style="height: 36px;">
            <svg style="aspect-ratio:1/1;" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M35.9828 18.3368C35.9828 16.8619 35.8604 15.7856 35.5953 14.6694H18.3586V21.3264H28.4761C28.2722 22.9808 27.1707 25.4722 24.7229 27.1463L24.6885 27.3692L30.1385 31.4945L30.5161 31.5313C33.9837 28.4021 35.9828 23.7979 35.9828 18.3368Z" fill="#4285F4"/>
              <path d="M18.3586 35.8763C23.3153 35.8763 27.4766 34.2818 30.5161 31.5313L24.7229 27.1463C23.1726 28.2027 21.0919 28.9402 18.3586 28.9402C13.5038 28.9402 9.38335 25.811 7.91452 21.486L7.69922 21.5038L2.03232 25.7891L1.95821 25.9904C4.97714 31.8501 11.1783 35.8763 18.3586 35.8763Z" fill="#34A853"/>
              <path d="M7.91452 21.4859C7.52695 20.3698 7.30266 19.1738 7.30266 17.9382C7.30266 16.7023 7.52695 15.5065 7.89412 14.3904L7.88386 14.1527L2.14594 9.79858L1.9582 9.88584C0.713953 12.3175 0 15.0481 0 17.9382C0 20.8282 0.713953 23.5587 1.9582 25.9903L7.91452 21.4859Z" fill="#FBBC05"/>

            </svg>
          </a>
        </div>

        <img style="width:121px; height:121px; aspect-ratio:1/1; border-radius:20px; position:absolute; left:136px; top:42px" src="https://api.builder.io/api/v1/image/assets/TEMP/0172e7dd37ba8858accae72af0a5f7013aafb5c9?width=242" alt="Logo" />
        
        <div style="width:266px; height:20px; position:absolute; left:63px; top:785px">
          <a href="#" style="color:#000; text-align:center; font-size:16px; position:absolute; left:201px; top:0px; width:65px; height:20px; text-decoration:underline">Políticas</a>
          <a href="#" style="color:#000; text-align:center; font-size:16px; position:absolute; left:82px; top:0px; width:93px; height:20px; text-decoration:underline">Privacidade</a>
          <a href="#" style="color:#000; text-align:center; font-size:16px; position:absolute; left:0px; top:0px; width:56px; height:20px; text-decoration:underline">Termos</a>
        </div>
      </form>

    </div>
  </div>

</body>
</html>
