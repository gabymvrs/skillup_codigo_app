<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
  <style>
    :root {
      --FontFamily_1-FontFamily-FontFamily: Lexend;
      --FontFamily_1-FontSizes-FontSize_1: 36px;
      --FontFamily_1-FontWeights-Weight_1: 400;
      --FontFamily_1-FontSizes-FontSize_7: 16px;
      --link: #154B8C;
      --FontFamily_1-FontSizes-FontSize_5: 20px;
    }

    /* Fundo Degradê ocupando a tela inteira */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #091E3A;  
      background: -webkit-linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);  
      background: linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A); 
      overflow: hidden;
    }

    /* Carcaça Externa do Celular com borda fina */
    .smartphone-container {
      width: 288px; /* Ajustado para a borda mais fina */
      height: 608px; /* Ajustado para a borda mais fina */
      background: #1a1b1e;
      border-radius: 36px;
      padding: 4px; /* Borda preta bem mais fina */
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Detalhe superior da câmera/alto-falante (Notch) */
    .smartphone-notch {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 18px;
      background-color: #1a1b1e;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      z-index: 10;
    }

    /* Tela interna que recebe o design */
    .phone-screen {
      width: 280px;
      height: 600px;
      background: #FFF;
      overflow: hidden;
      position: relative;
      border-radius: 32px;
    }

    /* Ajuste de escala do conteúdo do Figma */
    .figma-content {
      position: absolute;
      width: 393px;
      height: 852px;
      top: 0;
      left: 0;
      transform: scale(0.712); 
      transform-origin: top left;
    }
  </style>
</head>
