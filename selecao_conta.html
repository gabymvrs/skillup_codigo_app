<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Cadastro - Mobile Concept</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    /* 1. Troque o CSS do body */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #091E3A;
      background: -webkit-linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
      background: linear-gradient(to right, #2D9EE0, #2F80ED, #091E3A);
      overflow: hidden;
      font-family: 'Lexend', -apple-system, Roboto, sans-serif;
    }

    /* 2. Troque a carcaça do celular */
    .smartphone-container {
      width: 288px;
      height: 608px;
      background: #1a1b1e;
      border-radius: 36px;
      padding: 4px;
      box-shadow: 0 25px 50px rgba(0,0,0,.6);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 3. Troque a Dynamic Island pela Notch */
    .smartphone-notch {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 18px;
      background: #1a1b1e;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      z-index: 10;
    }

    /* 4. Troque a tela interna */
    .phone-screen {
      width: 280px;
      height: 600px;
      background: #FFF;
      overflow: hidden;
      position: relative;
      border-radius: 32px;
    }

    /* 5. Ajuste a escala do Figma e container de conteúdo responsivo */
    .figma-content {
      width: 393px;
      height: 852px;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(0.712);
      transform-origin: top left;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 42px 24px 35px 24px;
      box-sizing: border-box;
    }

    /* Estilização Moderna e Semântica do Layout Interno */
    .header-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .brand-logo {
      width: 121px;
      height: 121px;
      aspect-ratio: 1/1;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 28px;
    }

    .main-title {
      font-size: 36px;
      font-weight: 400;
      color: #000;
      margin: 0 0 8px 0;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 400;
      color: #000;
      max-width: 281px;
      margin: 0;
      line-height: 1.3;
    }

    /* Grupo de Opções de Conta */
    .account-options-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 295px;
      margin-top: -15px;
    }

    .option-card {
      display: flex;
      align-items: center;
      width: 295px;
      height: 77px;
      border-radius: 25px;
      border: 1px solid #898989;
      background: #F1F1F1;
      padding: 0 24px;
      box-sizing: border-box;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .option-card:hover {
      background: #e6e6e6;
    }

    .option-card svg {
      flex-shrink: 0;
      margin-right: 16px;
    }

    .option-text {
      font-size: 20px;
      font-weight: 400;
      color: #696868;
    }

    /* Rodapé e Links */
    .footer-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 44px;
      width: 100%;
    }

    .login-redirect {
      font-size: 16px;
      font-weight: 400;
      color: #154B8C;
      text-decoration: underline;
      cursor: pointer;
    }

    .legal-links {
      display: flex;
      justify-content: center;
      gap: 25px;
      width: 100%;
    }

    .legal-links a {
      font-size: 16px;
      font-weight: 400;
      color: #000;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
